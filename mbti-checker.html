<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI 성향 체크</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #f0f2f8;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #c8ccd8;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 14px;
      color: #8891a8;
      margin-bottom: 28px;
    }

    /* Progress */
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #8891a8;
      margin-bottom: 6px;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: #1e2235;
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .progress-fill {
      height: 100%;
      background: #5b8af5;
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* Card */
    .card {
      background: #171b27;
      border: 1px solid #232840;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-header {
      padding: 10px 16px;
      border-bottom: 1px solid #232840;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #8891a8;
    }

    .card-body {
      padding: 20px 16px;
    }

    .question-text {
      font-size: 16px;
      font-weight: 600;
      color: #e8eaf0;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* Options */
    .option-btn {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      background: #1e2235;
      border: 1px solid #2a2f47;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      color: #e8eaf0;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .option-btn:hover {
      background: #252b42;
      border-color: #5b8af5;
    }

    .option-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 50%;
      background: #5b8af5;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      margin-top: 1px;
    }

    /* Result */
    .result-hero {
      padding: 28px 24px;
      background: #171b27;
      border: 1px solid #232840;
      border-radius: 10px;
      margin-bottom: 24px;
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: #8891a8;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .mbti-type {
      font-size: 52px;
      font-weight: 700;
      color: #5b8af5;
      line-height: 1;
      display: inline-block;
      margin-right: 16px;
    }

    .mbti-title {
      font-size: 18px;
      font-weight: 600;
      color: #e8eaf0;
    }

    .mbti-desc {
      font-size: 14px;
      color: #8891a8;
      line-height: 1.6;
      margin-top: 10px;
    }

    /* Score bars */
    .score-section { margin-bottom: 24px; }

    .dim-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .dim-label {
      font-size: 12px;
      width: 80px;
      text-align: right;
      color: #8891a8;
      flex-shrink: 0;
    }

    .dim-label.active { color: #5b8af5; font-weight: 600; }

    .dim-bar-wrap {
      flex: 1;
      height: 6px;
      background: #1e2235;
      border-radius: 3px;
      overflow: hidden;
    }

    .dim-bar-fill {
      height: 100%;
      background: #5b8af5;
      border-radius: 3px;
    }

    .dim-bar-fill-right {
      height: 100%;
      background: #2a2f47;
      border-radius: 3px;
    }

    .dim-pct {
      font-size: 11px;
      color: #8891a8;
      width: 30px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Grid 2 col */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .dot { width: 5px; height: 5px; border-radius: 50%; background: #5b8af5; flex-shrink: 0; margin-top: 6px; }
    .dot-muted { background: #2a2f47; }

    .trait-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      color: #c8ccd8;
    }

    .compatible-box {
      padding: 10px 14px;
      background: #1e2235;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .compatible-label { color: #8891a8; }
    .compatible-value { color: #e8eaf0; font-weight: 600; }

    /* Buttons */
    .btn-primary {
      padding: 9px 20px;
      background: #5b8af5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      padding: 9px 16px;
      background: transparent;
      color: #8891a8;
      border: 1px solid #232840;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-ghost:hover { color: #c8ccd8; border-color: #3a3f5a; }

    .divider {
      height: 1px;
      background: #1e2235;
      margin: 20px 0;
    }

    .row-btns {
      display: flex;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const MBTI_INFO = {

  INFP: { title: "열정적인 중재자", desc: "시적이고 친절하며 항상 선한 것을 추구하는 유형. 깊은 내면 세계를 가진 이상주의자입니다.", strengths: ["강한 공감능력", "창의성", "진정성"], growth: ["현실과 균형 맞추기", "자기비판 줄이기"], compatible: "ENTJ, ENFJ" },

const DIM_LABELS = {
  EI: ["외향 (E)", "내향 (I)"],
  SN: ["감각 (S)", "직관 (N)"],
  TF: ["사고 (T)", "감정 (F)"],
  JP: ["판단 (J)", "인식 (P)"],
};

function computeResult(answers) {
  const counts = { EI: 0, SN: 0, TF: 0, JP: 0 };
  QUESTIONS.forEach(q => { if (answers[q.id] === "A") counts[q.dim]++; });
  return [
    counts.EI >= 3 ? "E" : "I",
    counts.SN >= 3 ? "S" : "N",
    counts.TF >= 3 ? "T" : "F",
    counts.JP >= 3 ? "J" : "P",
  ].join("");
}

function App() {
  const [answers, setAnswers] = useState({});
  const [screen, setScreen] = useState("quiz");

  const answered = Object.keys(answers).length;
  const currentQ = QUESTIONS[answered];

  const handleAnswer = (id, choice) => {
    const next = { ...answers, [id]: choice };
    setAnswers(next);
    if (Object.keys(next).length === QUESTIONS.length) {
      setScreen("result");
    }
  };

  const restart = () => { setAnswers({}); setScreen("quiz"); };

  if (screen === "result") {
    const mbti = computeResult(answers);
    const info = MBTI_INFO[mbti];
    const counts = { EI: 0, SN: 0, TF: 0, JP: 0 };
    QUESTIONS.forEach(q => { if (answers[q.id] === "A") counts[q.dim]++; });

    return (
      <div className="container">
        <h1>결과 분석 완료</h1>
        <p className="subtitle">20문항을 바탕으로 분석한 당신의 MBTI 유형입니다.</p>

        <div className="result-hero">
          <div className="result-label">당신의 유형</div>
          <div style={{display:"flex", alignItems:"baseline", gap:14, flexWrap:"wrap", marginBottom:10}}>
            <span className="mbti-type">{mbti}</span>
            <span className="mbti-title">{info.title}</span>
          </div>
          <p className="mbti-desc">{info.desc}</p>
        </div>

        <h2>성향 분포</h2>
        <p style={{fontSize:13,color:"#8891a8",marginBottom:14}}>각 차원별 응답 비율입니다.</p>
        <div className="score-section">
          {["EI","SN","TF","JP"].map(dim => {
            const aCount = counts[dim];
            const pctA = Math.round(aCount / 5 * 100);
            const pctB = 100 - pctA;
            const winA = aCount >= 3;
            const [labelA, labelB] = DIM_LABELS[dim];
            return (
              <div className="dim-row" key={dim}>
                <span className={`dim-label ${winA ? "active" : ""}`}>{labelA}</span>
                <div className="dim-bar-wrap"><div className="dim-bar-fill" style={{width:`${pctA}%`}} /></div>
                <span className="dim-pct">{pctA}%</span>
                <div className="dim-bar-wrap"><div className="dim-bar-fill-right" style={{width:`${pctB}%`}} /></div>
                <span className={`dim-label ${!winA ? "active" : ""}`} style={{textAlign:"left"}}>{labelB}</span>
              </div>
            );
          })}
        </div>

        <div className="grid-2">
          <div className="card">
            <div className="card-header">핵심 강점</div>
            <div className="card-body">
              {info.strengths.map(s => (
                <div className="trait-item" key={s}>
                  <div className="dot" style={{marginTop:5}} />
                  <span>{s}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-header">성장 포인트</div>
            <div className="card-body">
              {info.growth.map(g => (
                <div className="trait-item" key={g}>
                  <div className="dot dot-muted" style={{marginTop:5}} />
                  <span style={{color:"#8891a8"}}>{g}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="compatible-box">
          <span className="compatible-label">잘 맞는 유형</span>
          <span className="compatible-value">{info.compatible}</span>
        </div>

        <div className="divider" />
        <div className="row-btns">
          <button className="btn-primary" onClick={restart}>다시 테스트하기</button>
        </div>
      </div>
    );
  }

  const dimNames = { EI:"외향/내향", SN:"감각/직관", TF:"사고/감정", JP:"판단/인식" };
  const pct = Math.round(answered / QUESTIONS.length * 100);

  return (
    <div className="container">
      <h1>MBTI 성향 체크</h1>
      <p className="subtitle">각 문항에서 자신에게 더 가까운 쪽을 선택하세요.</p>

      <div className="progress-meta">
        <span>{answered} / {QUESTIONS.length} 문항</span>
        <span>{pct}%</span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{width:`${pct}%`}} />
      </div>

      {currentQ && (
        <div className="card">
          <div className="card-header">
            <span>Q{currentQ.id + 1}</span>
            <span>{dimNames[currentQ.dim]}</span>
          </div>
          <div className="card-body">
            <p className="question-text">{currentQ.text}</p>
            <button className="option-btn" onClick={() => handleAnswer(currentQ.id, "A")}>
              <span className="option-label">A</span>
              <span>{currentQ.a}</span>
            </button>
            <button className="option-btn" onClick={() => handleAnswer(currentQ.id, "B")}>
              <span className="option-label">B</span>
              <span>{currentQ.b}</span>
            </button>
          </div>
        </div>
      )}

      {answered > 0 && (
        <button className="btn-ghost" onClick={restart}>처음부터 다시하기</button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
